name: Publish on Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build & upload tools
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=61.0" wheel build twine

      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF##*/}"
          TAG_VERSION="${TAG_VERSION#v}"
          PACKAGE_VERSION="$(python -c 'from pathlib import Path; import re; text = Path("pyproject.toml").read_text(); match = re.search(r"(?m)^version = \"([^\"]+)\"", text); print(match.group(1)) if match else (_ for _ in ()).throw(SystemExit("Could not find project.version in pyproject.toml"))')"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject.toml version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Build distributions
        run: |
          rm -rf build/ dist/ *.egg-info
          python -m build

      - name: Create GitHub Release if not exists
        run: |
          VERSION="${GITHUB_REF##*/}"
          gh release view "$VERSION" || gh release create "$VERSION" --title "$VERSION" --notes "Automated release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload distributions to GitHub Release (clobber)
        run: |
          VERSION="${GITHUB_REF##*/}"
          gh release upload "$VERSION" dist/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload --skip-existing dist/*
